name: 微博热搜爬虫

on:
  # 每小时执行一次（Railway 已在实时更新，这里只做备份验证）
  schedule:
    - cron: "0 * * * *"
  # 手动触发
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    # 失败不发邮件通知
    continue-on-error: true
    
    steps:
      - name: 检出版本库
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: 安装依赖
        run: npm install
      
      - name: 执行爬虫
        run: npm run crawl
        # 失败不影响整体流程
        continue-on-error: true
      
      - name: 验证 Railway API 是否正常
        run: |
          echo "验证 Railway API..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://weibo-hotsearch-crawler-production.up.railway.app/api/stats")
          echo "API状态码: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Railway API 正常运行"
          else
            echo "Railway API 响应异常"
          fi
